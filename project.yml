name: Knot
options:
  bundleIdPrefix: com.p3ob7o
  deploymentTarget:
    macOS: "26.0"
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    CODE_SIGN_STYLE: Automatic

packages:
  KnotKit:
    path: Packages/KnotKit

targets:

  Knot-macOS:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Knot/Shared
      - path: Knot/macOS
    info:
      path: Knot/macOS/Generated-Info.plist
      properties:
        CFBundleDisplayName: Knot
        CFBundleName: Knot
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSUIElement: true
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: "Copyright © 2026 Paolo. All rights reserved."
        NSPrincipalClass: NSApplication
        NSSupportsAutomaticTermination: true
        NSSupportsSuddenTermination: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    entitlements:
      path: Knot/macOS/Knot-macOS.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.p3ob7o.knot
        PRODUCT_NAME: Knot
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
    dependencies:
      - package: KnotKit
        product: KnotKit

  Knot-iOS:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Knot/Shared
      - path: Knot/iOS
    info:
      path: Knot/iOS/Generated-Info.plist
      properties:
        CFBundleDisplayName: Knot
        CFBundleName: Knot
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: AccentColor
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiredDeviceCapabilities:
          - arm64
        UIBackgroundModes: []
    entitlements:
      path: Knot/iOS/Knot-iOS.entitlements
      properties: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.p3ob7o.knot
        PRODUCT_NAME: Knot
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: NO
    dependencies:
      - package: KnotKit
        product: KnotKit

schemes:
  Knot-macOS:
    build:
      targets:
        Knot-macOS: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  Knot-iOS:
    build:
      targets:
        Knot-iOS: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
